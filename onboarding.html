<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding</title>
    <script src="https://cdn.jsdelivr.net/npm/@n8n_io/n8n-client"></script>
</head>
<body>
    <h1>Onboarding for n8n Integration</h1>
    <script>
        // Initialize n8n client
        const client = createClient({ baseURL: 'https://your-n8n-instance.com' });

        async function initAuth() {
            try {
                await client.auth.authenticate();
                console.log('Authentication successful');
            } catch (error) {
                console.error('Authentication failed:', error);
            }
        }

        async function createWebHook() {
            const webhookData = { /* Your webhook data here */ };
            try {
                const response = await client.webhooks.create(webhookData);
                console.log('Webhook created:', response);
            } catch (error) {
                console.error('Error creating webhook:', error);
            }
        }

        // Initialize the application
        async function init() {
            await initAuth();
            await createWebHook();
        }

        init();
    </script>
</body>
</html>
